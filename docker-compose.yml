name: vollyeflow

services:
  mongo:
    image: mongo:8
    container_name: vollyeflow-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    networks:
      - vollyeflow-net

  server:
    build: ./server
    container_name: vollyeflow-server
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/vollyeflow?authSource=admin
    depends_on:
      - mongo
    networks:
      - vollyeflow-net

  client-build:
    build: ./client
    container_name: vollyeflow-client-build
    volumes:
      - client-dist:/dist

  nginx:
    image: nginx:alpine
    container_name: vollyeflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - client-dist:/usr/share/nginx/html:ro
    depends_on:
      - server
      - client-build
    networks:
      - vollyeflow-net

networks:
  vollyeflow-net:
    driver: bridge

volumes:
  mongo-data:
  client-dist:
